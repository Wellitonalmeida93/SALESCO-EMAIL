name: Relatorio Diario Salesco

# Define quando o robô vai rodar na nuvem
on:
  schedule:
    # Configurado para rodar todos os dias às 08:00 AM (Horário de Brasília)
    # Importante: O GitHub usa o horário UTC (08:00 BRT = 11:00 UTC)
    - cron: '0 11 * * *'
  
  # Permite que você clique em um botão no GitHub para rodar manualmente quando quiser
  workflow_dispatch:

jobs:
  executar-relatorio:
    runs-on: ubuntu-latest

    steps:
    # 🎯 PASSO ESSENCIAL QUE ESTAVA FALTANDO: Baixa o seu código e o script Python para o servidor do GitHub
    - name: 1. Puxar arquivos do repositório
      uses: actions/checkout@v4

    - name: 2. Instalar o ambiente Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Se você utiliza bibliotecas externas, instale-as aqui
    - name: 3. Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install selenium

    - name: 4. Executar o Script Python
      env:
        # Puxa de forma segura a senha configurada no seu GitHub Secrets
        SENHA_EMAIL: ${{ secrets.SENHA_EMAIL }}
      run: |
        # Executa o script diretamente na raiz do servidor
        python relatorio_salesco.py

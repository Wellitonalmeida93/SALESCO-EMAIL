name: Relatorio Diario Salesco

# Define os gatilhos de execução na nuvem
on:
  schedule:
    # Configurado para rodar automaticamente todos os dias às 08:00 AM (Horário de Brasília)
    # O GitHub usa o horário UTC (08:00 BRT equivale a 11:00 UTC)
    - cron: '0 11 * * *'
  
  # Cria um botão azul "Run workflow" no painel do GitHub para você rodar manualmente sempre que quiser
  workflow_dispatch:

jobs:
  executar-relatorio:
    runs-on: ubuntu-latest

    steps:
    # Passo 1: Baixa os arquivos do seu repositório (relatorio.py) para o servidor da nuvem
    - name: 1. Puxar arquivos do repositório
      uses: actions/checkout@v4

    # Passo 2: Configura o ambiente oficial do Python no servidor Linux
    - name: 2. Instalar o ambiente Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Passo 3: Instala o Playwright e baixa os navegadores necessários para rodar em segundo plano
    - name: 3. Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install playwright
        playwright install --with-deps chromium

    # Passo 4: Junta a sua senha secreta guardada no GitHub Secrets e roda o script correto
    - name: 4. Executar o Script Python
      env:
        SENHA_EMAIL: ${{ secrets.SENHA_EMAIL }}
      run: |
        python relatorio.py
